<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SkyFarms</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <!-- component -->
    <div class="relative snap-y snap-mandatory overflow-y-scroll h-screen">
      <div
        class="snap-start w-full h-screen flex flex-col items-center justify-center bg-cover bg-center relative"
        style="background-image: url(./assests/Designer.jpeg)"
      >
        <div class="absolute inset-0 bg-green-400 opacity-10"></div>
        <h2
          id="main-text"
          class="mt-auto text-6xl md:text-7xl lg:text-9xl font-bold text-white z-10"
        >
          SkyFarms
        </h2>
      </div>
      <div
        class="snap-start w-full h-screen flex flex-col items-center justify-center text-white bg-cover bg-center relative"
        style="background-image: url(./assests/Designer-1.jpeg)"
      >
        <div class="absolute inset-0"></div>
        <h2
          id="main-text"
          class="text-4xl md:mb-auto text-6xl lg:mb-auto text-7xl text-white z-10 text-center break-words"
        >
          Sustainable Farming for The Future
        </h2>
      </div>
      <div
        class="snap-start w-full h-screen flex flex-col items-center justify-center text-white relative"
      >
        <div
          class="absolute inset-0 w-full flex items-center justify-center z-10"
        >
          <div
            class="w-full md:w-1/2 h-full bg-cover bg-center"
            style="background-image: url('./assests/Skyhigh.jpeg')"
          ></div>
          <div
            class="w-full md:w-1/2 h-full bg-cover bg-center"
            style="background-image: url('./assests/Skyhightwo.jpeg')"
          ></div>
        </div>
        <h2
          id="main-text"
          class="text-3xl md:mt-auto text-6xl lg:text-7xl text-white z-10 text-center break-words"
        >
          The Future Should Look Like The Future
        </h2>
      </div>
      <div
        class="snap-start w-full h-screen flex flex-col items-center justify-center bg-gradient-to-b from-blue-200 to-indigo-100 text-black"
      >
        <div>
          <button
            type="button"
            class="hover:bg-gradient-to-l focus:ring-4 focus:outline-none focus:ring-purple-200 dark:focus:ring-purple-800 font-medium rounded-lg text-sm px-5 py-2.5 text-center me-2 mb-2"
            onclick="window.location.href='mailto:amourhamisiomar@gmail.com?subject=Contact%20Us&body=Hello%20there!'"
          >
            <p id="btn-text">Email Us</p>
          </button>
        </div>
        <h2
          id="main-text"
          class="p-2 text-4xl md:text-6xl lg:text-7xl font-bold text-white z-10"
        >
          Coming Soon.
        </h2>
      </div>
    </div>
  </body>
</html>
